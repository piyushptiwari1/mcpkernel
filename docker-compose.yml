services:
  mcpkernel:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./policies:/app/policies:ro
      - mcpkernel-data:/app/data
    environment:
      - MCPKERNEL_PROXY__HOST=0.0.0.0
      - MCPKERNEL_PROXY__PORT=8000
      - MCPKERNEL_SANDBOX__BACKEND=docker
      - MCPKERNEL_OBSERVABILITY__LOG_LEVEL=info
    restart: unless-stopped
    # Docker-in-Docker for sandbox backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - mcpkernel

volumes:
  mcpkernel-data:
