# MCPKernel configuration for the simple_mcp_server example
# Start the sample server first: python examples/simple_mcp_server/server.py

proxy:
  host: 127.0.0.1
  port: 8000

# Upstream MCP server - the sample server running on port 3001
upstream:
  - name: sample-server
    url: http://localhost:3001/mcp
    transport: streamable_http
    timeout_seconds: 30

# Policy: allow all tools (demo mode)
policy:
  policy_paths: []
  default_action: allow

# Taint tracking in light mode
taint:
  mode: light

# DEE traces
dee:
  enabled: true
  store_path: dee_store/traces.db

# Audit
audit:
  enabled: true
  log_path: dee_store/audit.db

# No auth for demo
auth:
  enabled: false
