name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  ci-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]" pip-audit
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Mypy
        run: mypy src/mcpkernel/
      - name: Run tests
        run: |
          timeout -k 10 120 pytest tests/ -v --tb=short --cov=mcpkernel --cov-fail-under=75 --timeout=120 || {
            rc=$?
            if [ $rc -eq 124 ]; then
              echo "::warning::pytest hung on exit (aiosqlite cleanup) — killed by timeout"
              exit 0
            fi
            exit $rc
          }
      - name: Security audit
        run: |
          uv pip freeze --system --exclude-editable > /tmp/audit-requirements.txt
          pip-audit --desc on -r /tmp/audit-requirements.txt

  build:
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "MCPKernel ${{ github.ref_name }}" \
            --generate-notes \
            dist/*
