name: Bug Report
description: Report a bug in MCPKernel
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: MCPKernel Version
      description: "Output of `mcpkernel --version` or commit hash"
      placeholder: "0.1.0 or abc1234"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which MCPKernel component is affected?
      options:
        - Proxy Gateway
        - Policy Engine
        - Taint Tracking
        - Sandbox (Docker/Firecracker/WASM)
        - DEE (Deterministic Execution Envelopes)
        - Audit Logging
        - Context Minimization
        - eBPF
        - Observability
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is
      placeholder: "When I do X, Y happens instead of Z"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs or error messages
      render: shell

  - type: dropdown
    id: python
    attributes:
      label: Python Version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Other
    validations:
      required: true
