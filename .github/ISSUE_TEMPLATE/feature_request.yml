name: Feature Request
description: Suggest a new feature or improvement for MCPKernel
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area does this feature relate to?
      options:
        - Proxy Gateway
        - Policy Engine
        - Taint Tracking
        - Sandbox (Docker/Firecracker/WASM)
        - DEE (Deterministic Execution Envelopes)
        - Audit Logging
        - Context Minimization
        - eBPF
        - Observability
        - CLI
        - New Component
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include API examples, config snippets, or diagrams if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: dropdown
    id: priority
    attributes:
      label: Priority (your estimate)
      options:
        - "Nice to have"
        - "Important"
        - "Critical for my use case"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this feature
